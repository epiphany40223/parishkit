name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install build

      - name: Validate release tag
        run: |
          test "$(git cat-file -t "${GITHUB_REF_NAME}")" = tag
          release_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          git merge-base --is-ancestor "${release_commit}" origin/main
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "v${version}" = "${GITHUB_REF_NAME}"

      - name: Ruff check
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Pytest
        run: python -m pytest

      - name: Build artifacts
        run: python -m build

      - name: Generate release notes
        run: |
          if test -f RELEASE_NOTES.md; then
            cp RELEASE_NOTES.md release-notes.md
          else
            python tools/prepare-release.py \
              --version "${GITHUB_REF_NAME#v}" \
              --write-notes release-notes.md
          fi

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/*
          if-no-files-found: error

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  publish:
    needs: validate-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          fi
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
